# OCR-confusable pairs. Each entry is a bidirectional substitution: in
# OCR'd text a→b and b→a both occur. The noise module picks one direction
# uniformly when applying the OCR perturbation.
#
# Multi-character pairs (e.g. "rn"↔"m") MUST come first because the noise
# applier matches the longest pattern that fits at the cursor.

multi_char:
  - {a: "rn", b: "m"}
  - {a: "vv", b: "w"}
  - {a: "cl", b: "d"}

single_char:
  - {a: "O", b: "0"}
  - {a: "o", b: "0"}
  - {a: "D", b: "0"}
  - {a: "l", b: "1"}
  - {a: "I", b: "1"}
  - {a: "|", b: "1"}
  - {a: "Z", b: "2"}
  - {a: "z", b: "2"}
  - {a: "S", b: "5"}
  - {a: "s", b: "5"}
  - {a: "B", b: "8"}
  - {a: "g", b: "9"}
  - {a: "q", b: "9"}
