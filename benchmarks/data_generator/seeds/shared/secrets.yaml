# Secret-token shapes. Each entry describes one well-known production
# credential format that our leak guard catches in real traffic; values are
# uniformly random within the documented shape so no real entropy can leak.
#
# Generation: a `RandomGen` picks one shape uniformly at random per call,
# then fills the body charset/length per the entry. Adding a new shape is a
# pure data change here; no code update needed.

shapes:
  - name: openai_anthropic
    pattern: "sk-{body}"
    body_charset: alphanum_mixed     # [A-Za-z0-9]
    body_length: 32

  - name: aws_access_key
    pattern: "AKIA{body}"
    body_charset: upper_alphanum     # [A-Z0-9]
    body_length: 16

  - name: github_pat
    pattern: "ghp_{body}"
    body_charset: alphanum_mixed
    body_length: 36

  - name: slack_bot_token
    # Compound shape: xoxb-NNNNNNNNNN-NNNNNNNNNNNN-XXXXXXXXXXXXXXXXXXXXXXXX
    pattern: "xoxb-{a}-{b}-{c}"
    parts:
      a:
        charset: digits              # [0-9]
        length: 10
      b:
        charset: digits
        length: 12
      c:
        charset: alphanum_mixed
        length: 24
