      - text: "В досье прикреплено фото разворота: {PASSPORTNUM}, без посторонних меток."
      - text: "Уведомление о пенсионном учёте оформлено на {RU_SNILS} согласно регламенту."
      - text: "Клиент верифицирован — {DATE} — биометрия совпала с документом."
