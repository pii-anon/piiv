      - text: "Регистрация участника: {PERSON_NAME}, паспорт {PASSPORTNUM}, проживает по адресу {STREET_ADDRESS}."
      - text: "Идентификация подтверждена: {PERSON_NAME}, дата рождения {DATE}, паспорт {PASSPORTNUM}."
      - text: "Заполните контактные данные: {PERSON_NAME}, телефон {PHONE}, e-mail {EMAIL}."
      - text: "Дополнительные документы клиента {PERSON_NAME}: ИНН {RU_INN}, СНИЛС {RU_SNILS}, паспорт {PASSPORTNUM}."
      - text: "Паспорт для проверки личности: {PASSPORTNUM}."
      - text: "В анкете указан паспорт {PASSPORTNUM}."
      - text: "Скан паспорта {PASSPORTNUM} ожидает ручной проверки."
      - text: "Контрольная сверка выполнена по паспорту {PASSPORTNUM}."
      - text: "ИНН {RU_INN} указан для проверки источников."
      - text: "В регистрационной форме указан ИНН {RU_INN}."
      - text: "Налоговый идентификатор ИНН {RU_INN} отправлен на сверку."
      - text: "СНИЛС {RU_SNILS} внесён в блок государственных идентификаторов."
      - text: "Поле СНИЛС заполнено значением {RU_SNILS}."
      - text: "Страховой номер {RU_SNILS} отправлен на контроль формата."
      - text: "Дата рождения клиента зафиксирована как {DATE}."
      - text: "В анкете самозанятого указана дата рождения {DATE}."
      - text: "ФИО проверяемого лица: {PERSON_NAME}."
      - text: "Клиент {PERSON_NAME} проходит дистанционную идентификацию."
      - text: "Верификационный профиль создан для {PERSON_NAME}."
      - text: "Контактный телефон анкеты: {PHONE}."
