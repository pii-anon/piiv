    weight: 20
    templates:
      # — single-PII —
      - text: "Платёж проведён на расчётный счёт {RU_BANK_ACCOUNT}."
        weight: 2
      - text: "Реквизиты получателя: р/с {RU_BANK_ACCOUNT}."
