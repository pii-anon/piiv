      - text: "Контрольные поля: ИНН {RU_INN}, СНИЛС {RU_SNILS}, паспорт {PASSPORTNUM}."
      - text: "Профиль клиента {PERSON_NAME}: ИНН {RU_INN}, адрес {STREET_ADDRESS}."
