      - text: "В платёжке указан КПП {RU_KPP} организации."
      - text: "КПП в реквизитах: {RU_KPP}."
      - text: "Перевод оформлен на IBAN {IBAN}."
        weight: 2
      - text: "Международный платёж на счёт IBAN {IBAN}."
