        weight: 3
      - text: "Для оформления договора клиент {PERSON_NAME}: паспорт {PASSPORTNUM}."
        weight: 2
      - text: "Заявление от {PERSON_NAME}, ИНН {RU_INN}, дата рождения {DATE}."
        weight: 2
