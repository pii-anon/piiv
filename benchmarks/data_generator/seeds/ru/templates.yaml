      - text: "Анкета клиента: ИНН {RU_INN}."
        weight: 2
      - text: "Налоговый номер ИНН {RU_INN} занесён в карточку."
      - text: "Поле для ИНН: {RU_INN}."
      - text: "СНИЛС клиента {RU_SNILS} необходим для оформления полиса."
        weight: 2
