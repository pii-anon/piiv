        weight: 2
      - text: "{PERSON_NAME} просит перенос времени, перезвоните на {PHONE}."
      - text: "Заявка от {PERSON_NAME}, машина {LICENSE_PLATE}, готова к выдаче."
      - text: "Звонил {PERSON_NAME} с {PHONE}, оставил сообщение для перезвона."
      - text: "Подтвердите доставку: получатель {PERSON_NAME}, телефон {PHONE}, адрес {STREET_ADDRESS}."
      - text: "Корпоративный клиент {PERSON_NAME} ({EMAIL}) запрашивает прайс-лист."
