      - text: "Лицо, подписавшее соглашение, идентифицировано по {PASSPORTNUM} в реестре."
      - text: "Запись из СФР по застрахованному лицу — {RU_SNILS} — приобщена к материалам."
      - text: "Налоговая ответственность стороны фиксируется реквизитом {RU_INN} в реестре."
