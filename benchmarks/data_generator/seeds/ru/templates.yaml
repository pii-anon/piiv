      - text: "Контактная проверка заявителя {PERSON_NAME}: {PHONE}, {EMAIL}."
      - text: "Сведения о клиенте: {PERSON_NAME}, дата рождения {DATE}, адрес {STREET_ADDRESS}."
      # — naturalistic (regex keyword anchor avoided) —
      - text: "Поле для налоговых реквизитов заполнено — {RU_INN}, продолжаем оформление."
      - text: "Контрагент идентифицирован, значение реквизита: {RU_INN}."
      - text: "Бухгалтер уточнил налоговый идентификатор контрагента — {RU_INN} — и закрыл задачу."
      - text: "В справке указано: {PASSPORTNUM}, документы переданы юристу."
      - text: "Свидетельство о пенсионном страховании клиента — {RU_SNILS} — подшито в дело."
      - text: "Согласно представленным документам — {DATE} — анкета актуальна."
      - text: "В реестре участника указано {RU_OGRN}, дополнительная сверка не нужна."
      - text: "Регистрационная запись юрлица содержит {RU_OGRN}, статус — действующий."
