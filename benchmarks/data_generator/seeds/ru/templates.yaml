# Russian slot-templates. Each template is a complete sentence with named
# slots like {PERSON_NAME} or {RU_INN}; the generator fills slots with
# synthetic values from the matching generator and emits character-level
# gold spans for each one. Slot names are the canonical placeholder
# taxonomy without brackets.
#
# Templates are organised into five business-domain categories so
# distribution stats can show coverage like "37% customer_service".
# Category weights determine how often examples are drawn from each.
# Within a category, individual template `weight`s bias which sentence
# pattern wins (default 1).
#
# Authoring guidelines:
#   * Each template = one complete sentence ending in a terminal
#     punctuation mark. The injector will not append anything after.
#   * Keep the business register: customer-service / KYC / billing /
#     internal-log / legal voice. No colloquialisms, no profanity.
#   * Slot names must match exactly: {PERSON_NAME}, {RU_INN}, etc.
#     Unknown slots fail-fast at load time.
#   * 1-4 PII slots per template. Five-slot mega-templates exist (legal
#     "full reqisites" line) but we keep them rare.

categories:

  # =================================================================
  # CUSTOMER SERVICE — call center, ticketing, support requests.
  # =================================================================
  customer_service:
    weight: 30
    templates:
      # — single-PII —
      - text: "Клиент {PERSON_NAME} перезвонил по заявке от вчерашнего дня."
        weight: 2
      - text: "Менеджер связался с {PERSON_NAME} для уточнения деталей доставки."
      - text: "Звонит {PERSON_NAME}, переведите на профильного специалиста."
      - text: "Запись на сегодня: {PERSON_NAME}, прошу подтвердить визит."
      - text: "По телефону {PHONE} клиент сообщил о проблеме с активацией."
        weight: 2
      - text: "Контактный номер {PHONE} указан в карточке обращения."
      - text: "Перезвонить по {PHONE} после 14:00."
      - text: "В заявке указан рабочий телефон {PHONE}."
      - text: "Письмо с инструкцией по сбросу пароля направлено на {EMAIL}."
        weight: 2
      - text: "Дублируйте ответ на {EMAIL}, спасибо."
      - text: "Корреспонденция по обращению ведётся через {EMAIL}."
      - text: "Клиент просит выслать договор на адрес электронной почты {EMAIL}."
      - text: "Курьер выехал по адресу {STREET_ADDRESS}."
      - text: "Доставка оформлена по адресу: {STREET_ADDRESS}."
      - text: "Заберите посылку самостоятельно: {STREET_ADDRESS}."
      - text: "Автомобиль {LICENSE_PLATE} ожидает выдачи на стоянке."
      - text: "Госномер {LICENSE_PLATE} передан на проверку в ГИБДД."
      - text: "Клиент назвал номер карты {CARD} для оплаты по телефону."
      - text: "Возврат средств оформлен на карту {CARD}, ожидайте 3-5 дней."
      # — multi-PII —
      - text: "Клиент {PERSON_NAME}, телефон {PHONE}, ожидает обратного звонка."
        weight: 3
      - text: "На имя {PERSON_NAME} оформлена заявка, контакт: {EMAIL}."
