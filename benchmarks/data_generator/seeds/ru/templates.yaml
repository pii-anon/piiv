      - text: "СМС-уведомление о готовности заказа отправлено на {PHONE}, дублируем на {EMAIL}."
      - text: "Оператор подтвердил, что {PERSON_NAME} ожидает ответ по обращению."
      - text: "Запрос от {PERSON_NAME} переведён в очередь повторной проверки."
      - text: "В карточке обращения указан заявитель {PERSON_NAME}."
      - text: "Консультация назначена для клиента {PERSON_NAME}."
      - text: "Ответ по претензии подготовлен для {PERSON_NAME}."
      - text: "Клиент просит оставить контактным номером {PHONE}."
      - text: "Для обратной связи сохранён телефон {PHONE}."
      - text: "Робот дозвона не смог связаться по номеру {PHONE}."
      - text: "Контактный телефон для уточнения статуса: {PHONE}."
      - text: "Служба поддержки получила новое сообщение с номера {PHONE}."
      - text: "Инструкции по подключению отправлены на {EMAIL}."
