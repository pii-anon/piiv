# into gender-coherent three-part nominative-case names
# (Surname First Patronymic). Feminine inflection rules below transform
# masculine surnames when paired with a female first name.
#
# Adding a name: just append. The generator uses uniform sampling from
# each list, so a longer list increases that name's frequency only by
# 1/N where N is the total list size.
#
# Pools were mined from prior `faker_providers.py` constants, plus
# hand-curated additions.

