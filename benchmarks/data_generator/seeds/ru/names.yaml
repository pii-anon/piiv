# Surname suffix transformations applied when the first name is female.
# Order matters: longer suffixes first to avoid mis-matching ("ин" should
# match "Никитин" but not be applied before "ский" on hypothetical
# "Никитинский" — though we don't model -ский inflection in v1).
feminine_inflections:
  - {suffix: "ов", becomes: "ова"}
  - {suffix: "ев", becomes: "ева"}
  - {suffix: "ёв", becomes: "ёва"}
  - {suffix: "ин", becomes: "ина"}
  - {suffix: "ский", becomes: "ская"}
  - {suffix: "цкий", becomes: "цкая"}
  - {suffix: "ой", becomes: "ая"}
  - {suffix: "ый", becomes: "ая"}
  - {suffix: "ой", becomes: "ая"}

# Initials variant — used when a template wants a compact name form
# like "Иванов И.И." instead of the full triple.
short_format: "{last} {first_initial}.{patronymic_initial}."
