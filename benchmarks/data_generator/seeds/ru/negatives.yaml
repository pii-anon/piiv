# Hard negatives — sentences with PII-shaped patterns that should NOT
# trigger detection. The generator emits these as zero-span examples
# mixed into the dataset at the configured probability.
#
# Reviewer-friendly hard negatives include:
#   * Numbers that match a PII regex shape but are NOT PII in context
#     (room numbers, order IDs, version strings, log line numbers, etc.)
#   * Partial PII fragments ("ИНН 770708...")
#   * Public-company / public-figure mentions (organisations are
#     intentionally NOT in the personal-data taxonomy)
#   * Coordinates, dates without context anchors, vehicle catalogue codes,
#     test-fixture identifiers
#   * URLs without surrounding personal data
#
# Categorisation here is loose; the generator samples uniformly across
# the flat list. The per-category split exists only to help reviewers
# audit coverage of each negative class.

# Probability that any individual example produced by the pipeline is a
# hard negative rather than a positive.
probability: 0.15

