# Russian-specific identifier configuration. These are the *data tables*
# the algorithms read; the algorithms themselves (INN/SNILS/OGRN/VIN
# checksums, BIK 04-prefix rule, plate format) live in `faker_providers.py`
# because they are math, not data.

# Cyrillic letters allowed on Russian civilian licence plates. The plate
# format is `<L1><DDD><L2><L3><RR[R]>[RUS]` where L1, L2, L3 are drawn
# from this set.
plate_letters: "АВЕКМНОРСТУХ"

# Region codes printed at the right of the plate. We use only realistic
# active regional codes — drivers register a plate in one place; the
# generator picks one of these per call.
plate_regions:
  - 16    # Татарстан
  - 18    # Удмуртия
  - 23    # Краснодарский край
  - 24    # Красноярский край
  - 25    # Приморский край
  - 36    # Воронежская область
