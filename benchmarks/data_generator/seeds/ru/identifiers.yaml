# Probability the plate carries the trailing "RUS" tag. Most do; some lookups
# strip it (e.g. ANPR systems sometimes omit), so we keep some without.
plate_rus_suffix_probability: 0.65

# OSAGO insurance series. Cyrillic three-letter prefixes per РСА Resolution
# No. 277. The generator picks one + a 10-digit number.
osago_series:
  - ХХХ
  - МММ
  - ККК
  - РРР
  - ТТТ
  - ААА

