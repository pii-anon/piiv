# RU phone format strings. {op} = mobile prefix, {a},{b},{c} = three digit
# blocks of the line number.
phone_formats:
  - "+7 {op} {a}-{b}-{c}"
  - "+7 ({op}) {a}-{b}-{c}"
  - "8 ({op}) {a} {b} {c}"
  - "+7{op}{a}{b}{c}"
  - "8 {op} {a} {b} {c}"
  - "8{op}{a}{b}{c}"
  - "+7-{op}-{a}-{b}-{c}"
  - "+7 ({op}) {a} {b}-{c}"
  - "8-{op}-{a}-{b}-{c}"
  - "+7 {op}-{a}-{b}-{c}"
  - "+7 ({op}) {a}{b}{c}"
  - "+7 {op} {a} {b}-{c}"
