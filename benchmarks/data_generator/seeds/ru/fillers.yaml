# Filler sentences — neutral, business-register prose with NO PII slots
# that the pipeline randomly prepends and/or appends to a rendered template
# to add length variety and multi-sentence context.
#
# Fillers are matched to the source template's category, so a customer-
# service template gets customer-service fillers and a billing template
# gets billing fillers — no genre crossover that would read as awkward.
#
# Authoring guidelines:
#   * Each filler is one short sentence ending in a terminal mark.
#   * No PII slots; no PII-shaped content (those go in negatives.yaml).
#   * Same business register as the matching template category.
#   * The pipeline appends after a single space, so each filler should
#     read cleanly when joined with a period and a space.

# Probabilities per side. Independent rolls — an example may pick up
# both a prepended and an appended filler (~9% chance with these
# defaults), one of each (~42%), or none (~49%).
prepend_probability: 0.30
append_probability: 0.30

