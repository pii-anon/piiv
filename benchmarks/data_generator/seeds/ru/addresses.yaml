# Format strings; the generator picks one uniformly. Slots:
#   {city}     — full city tag (e.g. "г. Москва")
#   {street}   — street name (e.g. "ул. Тверская")
#   {house}    — house number, drawn from house_range
#   {apt}      — apartment number, drawn from apt_range
#   {korp}     — building number, drawn from korp_range
formats:
  - "{city}, {street}, д. {house}, кв. {apt}"
  - "{city}, {street}, дом {house}, квартира {apt}"
  - "{city}, {street}, {house}, кв. {apt}"
  - "{city}, {street}, дом {house}"
  - "{city}, {street}, д. {house}, корпус {korp}, кв. {apt}"
  - "{city}, {street}, д. {house}, к. {korp}"
  - "{city}, {street}, д. {house}/{korp}, кв. {apt}"
  - "{street}, д. {house}, кв. {apt}, {city}"
  - "{city}; {street}; дом {house}; кв. {apt}"
  - "адрес: {city}, {street}, {house}-{korp}, кв. {apt}"
  - "{city}, {street}, д. {house}, стр. {korp}"
  - "{city}, {street}, дом {house}, корпус {korp}"
  - "{city}, {street}, подъезд не указан, д. {house}, кв. {apt}"
  - "Российская Федерация, {city}, {street}, д. {house}, кв. {apt}"

house_range: [1, 250]
apt_range: [1, 250]
korp_range: [1, 10]
