# ----------------------------------------------------------------------
# Closers / prefixes
# ----------------------------------------------------------------------
# Mirrors EN: closer with a leading comma so it attaches grammatically
# to the preceding slot ("...{PHONE}, bitte." not "...{PHONE} bitte.").
intent_please_lookup:
  - ", bitte."
  - ", danke."
  - ", möglichst zeitnah."
  - "."
