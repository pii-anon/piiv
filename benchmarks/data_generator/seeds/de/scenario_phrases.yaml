# German scenario-phrase fragments for the trilingual evaluation suite.
#
# Mirrors the English file 1:1 in structure: same intent keys, same number
# of variants per key (where possible), same role in the scenario. Only
# the surface wording is German.
#
# Native-speaker review notes (please audit before freezing v1):
#   - "Telefonnummer" used over the colloquial "Handynummer" since
#     scenarios cover both mobile and landline.
#   - "Steuer-ID" used as the user-facing label; "Steueridentifikationsnummer"
#     is the formal long form.
#   - Imperatives ("Suche", "Aktualisiere") used to match support-agent
#     command tone in EN/RU files.

# ----------------------------------------------------------------------
# Customer lookup
# ----------------------------------------------------------------------
# Imperative-only — interrogative variants removed so the
# {{intent_please_lookup}} closer doesn't yield mismatched punctuation.
intent_lookup_phone:
  - "Suche den Kunden mit der Telefonnummer"
  - "Schlage den Kontoinhaber für die Telefonnummer"
  - "Hole den Kundendatensatz für die Telefonnummer"
  - "Suche den Kontoinhaber zur Telefonnummer"

intent_lookup_email:
  - "Suche den Kunden mit der E-Mail"
  - "Hole das Konto für"
  - "Finde den Kunden mit E-Mail"
  - "Hole den Kundendatensatz für"

intent_lookup_name:
  - "Finde den Kundendatensatz für"
  - "Suche den Kunden namens"
  - "Hole das Konto für den Kunden"

intent_lookup_tax_id:
  - "Hole die Auftragnehmer-Rechnungen zur Steuer-ID"
  - "Zeige offene Rechnungen für den Auftragnehmer mit Steuer-ID"
  - "Suche den Auftragnehmer mit Steuer-ID"

intent_lookup_card:
  - "Suche die Zahlung auf der Karte"
  - "Untersuche den Streitfall zur Karte"
  - "Finde den Zahlungsdatensatz für die Karte"

intent_lookup_order:
  - "Zeige den Status der Bestellung"
  - "Hole die Details für die Bestellung"
  - "Hole den aktuellen Stand der Bestellung"

# ----------------------------------------------------------------------
# Verify / cancel / reschedule
# ----------------------------------------------------------------------
intent_verify_id:
  - "Überprüfe die nationale Kennung"
  - "Führe eine Verifizierung der Kennung durch"
  - "Prüfe die Gültigkeit der Steuer-ID"

intent_cancel_appointment:
  - "Storniere den Termin für den Kunden mit Telefon"
  - "Sage den anstehenden Termin ab für"

intent_reschedule_appointment:
  - "Verschiebe den Termin für die Telefonnummer"
  - "Verlege den Termin für"

# ----------------------------------------------------------------------
# Cross-turn / follow-up
# ----------------------------------------------------------------------
intent_followup_email:
  - "Wie lautet ihre E-Mail-Adresse?"
  - "Welche E-Mail haben wir für sie hinterlegt?"
  - "Wiederhole bitte ihre E-Mail."

intent_followup_phone:
  - "Wie lautet ihre Telefonnummer?"
  - "Wiederhole ihre Telefonnummer im internationalen Format."
  - "Nenne mir die Telefonnummer im internationalen Format."

intent_followup_address:
  - "Wie lautet ihre Rechnungsadresse?"
  - "Lies mir bitte ihre Rechnungsadresse vor."

intent_followup_tier:
  - "Welche Stufe haben sie?"
  - "Nenne mir ihre Konto-Stufe."

intent_followup_card_last4:
  - "Nenne mir die letzten vier Ziffern der hinterlegten Karte."
  - "Was sind die letzten vier Ziffern ihrer Karte?"

# ----------------------------------------------------------------------
# Update / mutate
# ----------------------------------------------------------------------
intent_update_contact_email:
  - "Aktualisiere den Kontakt mit der neuen E-Mail"
  - "Setze die neue E-Mail des Kontakts auf"
  - "Ändere die hinterlegte E-Mail auf"

intent_update_contact_phone:
  - "Aktualisiere den Kontakt mit der neuen Telefonnummer"
  - "Setze die neue Telefonnummer des Kontakts auf"

intent_update_ticket_status:
  - "Markiere das Ticket als erledigt:"
  - "Setze den Ticketstatus auf erledigt für Ticket"

