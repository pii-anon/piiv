      - text: "Die Personenkennzahl lautet {DE_STEUER_ID}."
      - text: "Im ELSTER-Abgleich tauchte die Kennzahl {DE_STEUER_ID} auf."
      - text: "Die Bescheinigung der Bundeszentrale verweist auf die Kennziffer {DE_STEUER_ID}."
