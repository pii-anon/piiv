      - text: "Die Dokumentenkennung {DE_PERSONALAUSWEIS} wurde aus dem Akteneintrag übernommen."
      - text: "Der Kunde legte das Identitätsdokument {DE_PERSONALAUSWEIS} zur Verifizierung vor."
      - text: "Das Stammdatum des Kunden ist {DATE}."
        weight: 2
      - text: "Der Antragsteller wurde am {DATE} im Personenstand erfasst."
