  # =================================================================
  # KYC -- Identitätsprüfung, Kontoeröffnung, Dokumentenprüfung.
  # =================================================================
  kyc:
    weight: 20
    templates:
      - text: "Das Identitätsformular enthält die Kennziffer {DE_STEUER_ID}."
        weight: 2
      - text: "Der Antrag nennt die Personenkennzahl {DE_STEUER_ID}."
