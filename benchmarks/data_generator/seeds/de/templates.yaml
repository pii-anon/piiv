# Deutsche Slot-Vorlagen. Jede Vorlage ist ein vollständiger Satz mit Slots
# wie {PERSON_NAME} oder {DE_STEUER_ID}. Die Vorlagen sind nach denselben
# Geschäftskategorien organisiert wie RU/EN.
#
# Wichtig: Steuer-ID, Personalausweis, Geburtsdatum und lokale Telefonnummern
# brauchen bewusst nahe Kontextanker, damit die deutsche Regex-Policy sie
# zuverlässig und ohne viele False Positives erkennt.

categories:

  # =================================================================
