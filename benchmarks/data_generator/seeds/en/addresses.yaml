formats:
  - "{house} {street}, {city}"
  - "{house} {street}, Apt {apt}, {city}"
  - "{house} {street}, Unit {apt}, {city}"
  - "{house} {street} #{apt}, {city}"
  - "{house} {street}, Suite {apt}, {city}"
  - "{house}-{korp} {street}, {city}"
  - "{street}, Building {house}, Unit {apt}, {city}"
  - "{city}, {house} {street}, Apt. {apt}"
  - "{house} {street}, Floor {korp}, {city}"
  - "Mailing address: {house} {street}, {city}"
  - "{house} {street}, {city}, USA"
  - "{house} {street}, Ste {apt}, {city}"

house_range: [10, 9999]
apt_range: [1, 999]
korp_range: [1, 20]
