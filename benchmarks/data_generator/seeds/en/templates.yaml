# English / US-centric slot templates. Each template is a complete sentence
# with named slots such as {PERSON_NAME} or {US_SSN}; the generator fills
# slots with synthetic values and emits character-level gold spans.
#
# Authoring guidelines mirror the RU seeds:
#   * One complete sentence per template.
#   * Business-register prose.
#   * Slot names must match the canonical placeholder taxonomy.
#   * Date-of-birth templates include an explicit DOB/birth anchor because
#     the regex policy intentionally anchors date matches by context.

categories:

