# Hard-negative scenarios.
#
# Numeric noise that mimics PII patterns but lacks the contextual anchor
# the regex requires. The detector should NOT fire; tool-call success is
# excluded from the denominator (no expected_tool_calls), so these
# scenarios only score detection precision.
#
# Every scenario uses ``turns_per_locale`` because the framing
# sentences are the whole point of the hard negative — a German turn
# must read like a German turn, not a German noun + English tail.
# Native-speaker review of DE/RU is recommended before paper submission.

- scenario_id: scn-neg-601
  bucket: hard_negative
  workflow: order_tracking_digits
  turns_per_locale:
    en:
      - "Tracking number 7707083893 was shipped yesterday."
    de:
      - "Sendungsnummer 7707083893 wurde gestern versandt."
    ru:
      - "Трекинг-номер 7707083893 был отправлен вчера."

