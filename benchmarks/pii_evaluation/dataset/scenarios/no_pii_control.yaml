# No-PII control scenarios.
#
# The model still calls a tool, but on a non-PII identifier (order ref,
# ticket id). Detector should produce zero spans; tool-call success
# scored normally. Catches false positives from over-eager regex
# patterns that match digit-shaped identifiers (e.g. "ORD-1042").
#
# These scenarios reference the static _ORDERS table in tools.py
# (order_401 etc.), so they need no per-scenario fixtures — only an
# explicit ``expected_record_id`` on the call.

- scenario_id: scn-ctl-501
  bucket: no_pii_control
  workflow: order_lookup
  turns:
    - "{{intent_lookup_order}} {ORDER_ID}{{intent_please_lookup}}"
  expected_tool_calls:
    - turn_index: 0
      tool_name: order_lookup_by_reference
      arguments: { order_id: "{ORDER_ID}" }
      expected_record_id: order_401
  literal_slots:
    ORDER_ID: "ORD-1001"

