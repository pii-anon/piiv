# ----------------------------------------------------------------------
# Detection-only PII types embedded alongside a tool-touching span (6) —
# folds the legacy detection_only bucket into Multi-PII per design.
# IBAN / IP / URL / license_plate / DATE / VIN appear inline; the
# detector is scored on those, the tool call is on phone or email.
# ----------------------------------------------------------------------
