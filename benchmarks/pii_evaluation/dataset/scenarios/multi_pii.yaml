# Multi-PII single-turn scenarios.
#
# Two or more PII spans in one turn. Tests detector precision/recall on
# co-located PII (does the merge step in redact_pii_text correctly
# preserve all spans?) and tool-call disambiguation when multiple
# entities could plausibly drive different lookups.
#
# All scenarios use ``turns_per_locale`` because the framing sentences
# vary too much across English / German / Russian to render cleanly
# from a single template + intent fragments. Native-speaker review of
# the DE and RU phrasings is recommended before paper submission.

# ----------------------------------------------------------------------
# Two-PII (4)
# ----------------------------------------------------------------------
- scenario_id: scn-mp-301
  bucket: multi_pii
  workflow: lookup_email_with_phone_context
  turns_per_locale:
    en:
      - "Reach out to the customer at {EMAIL} with phone {PHONE} — they need a callback."
    de:
      - "Kontaktiere den Kunden unter {EMAIL} mit Telefon {PHONE} — sie benötigen einen Rückruf."
    ru:
      - "Свяжись с клиентом по адресу {EMAIL} и номеру {PHONE} — нужен обратный звонок."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_email
      arguments: { email: "{EMAIL}" }
      record_key: customer_email

- scenario_id: scn-mp-302
  bucket: multi_pii
  workflow: dispute_card_with_email
  turns_per_locale:
    en:
      - "We need to dispute the charge on card {CARD} for the account at {EMAIL}."
    de:
      - "Wir müssen die Belastung auf Karte {CARD} für das Konto unter {EMAIL} anfechten."
    ru:
      - "Нужно оспорить списание с карты {CARD} для аккаунта по адресу {EMAIL}."
  expected_tool_calls:
    - turn_index: 0
      tool_name: payment_lookup_by_card
      arguments: { card_number: "{CARD}" }
      record_key: payment

- scenario_id: scn-mp-303
  bucket: multi_pii
  workflow: lookup_phone_with_email_context
  turns_per_locale:
    en:
      - "The customer at {EMAIL} reached us from phone {PHONE} — find their account."
    de:
      - "Der Kunde unter {EMAIL} hat uns von Telefon {PHONE} erreicht — finde sein Konto."
    ru:
      - "Клиент по адресу {EMAIL} обратился с номера {PHONE} — найди его аккаунт."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_phone
      arguments: { phone: "{PHONE}" }
      record_key: customer_phone

- scenario_id: scn-mp-304
  bucket: multi_pii
  workflow: lookup_name_with_phone_context
  turns_per_locale:
    en:
      - "Pull the file for {PERSON_NAME} reachable at {PHONE}."
    de:
      - "Hole die Akte von {PERSON_NAME}, erreichbar unter {PHONE}."
    ru:
      - "Подними дело {PERSON_NAME}, доступен по номеру {PHONE}."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_name
      arguments: { name: "{PERSON_NAME}" }
      record_key: customer_name

