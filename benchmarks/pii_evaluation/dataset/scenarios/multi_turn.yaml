# Multi-turn update_contact with a *new* address — renamed from the
# original "cross-turn-taint" archetype after the §3 evaluation
# surfaced a test-design bug: the turn-2 confirm-address was injected
# from the fixture's own address field, making turn-2 == fixture and
# turning update_contact into a semantic no-op that every model
# (correctly) skipped. The current shape uses a freshly-drawn
# {STREET_ADDRESS} (distinct from the fixture's prior draw) and an
# explicit "update" intent so the test exercises the path it names.
- scenario_id: scn-mt-205
  bucket: multi_turn
  workflow: update_contact_address_change
  turns_per_locale:
    en:
      - "{{intent_lookup_phone}} {PHONE}. {{intent_followup_address}}"
      - "Update their address to {STREET_ADDRESS} on that contact."
    de:
      - "{{intent_lookup_phone}} {PHONE}. {{intent_followup_address}}"
      - "Aktualisiere ihre Adresse zu {STREET_ADDRESS} bei diesem Kontakt."
    ru:
      - "{{intent_lookup_phone}} {PHONE}. {{intent_followup_address}}"
      - "Обнови адрес на {STREET_ADDRESS} в карточке этого контакта."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_phone
      arguments: { phone: "{PHONE}" }
      record_key: customer_phone
    - turn_index: 1
      tool_name: update_contact
      arguments:
        record_id: "<record:customer_phone.record_id>"
      record_key: customer_phone

