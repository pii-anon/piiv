# ----------------------------------------------------------------------
# Cross-turn-taint: tool result injects NEW email; turn 1 references it
# in an update_contact call. (4 scenarios — one per injected PII type.)
# ----------------------------------------------------------------------
- scenario_id: scn-mt-201
  bucket: multi_turn
  workflow: cross_turn_taint_email_to_update_contact
  turns:
    - "{{intent_lookup_phone}} {PHONE}. {{intent_followup_email}}"
    - "{{intent_update_contact_email}} {INJECTED_EMAIL}."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_phone
      arguments: { phone: "{PHONE}" }
      record_key: customer_phone
    - turn_index: 1
      tool_name: update_contact
      arguments:
        record_id: "<record:customer_phone.record_id>"
        email: "{INJECTED_EMAIL}"
      record_key: customer_phone
  injected_pii:
    - producing_call_index: 0
      turn_index: 1
      placeholder: "[EMAIL]"
      from_record_field: email
      slot_name: EMAIL
      must_appear_in_turn: 1

- scenario_id: scn-mt-202
  bucket: multi_turn
  workflow: cross_turn_taint_phone_to_update_contact
  turns:
    - "{{intent_lookup_email}} {EMAIL}. {{intent_followup_phone}}"
    - "{{intent_update_contact_phone}} {INJECTED_PHONE}."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_email
      arguments: { email: "{EMAIL}" }
      record_key: customer_email
    - turn_index: 1
      tool_name: update_contact
      arguments:
        record_id: "<record:customer_email.record_id>"
        phone: "{INJECTED_PHONE}"
      record_key: customer_email
  injected_pii:
    - producing_call_index: 0
      turn_index: 1
      placeholder: "[PHONE]"
      from_record_field: phone
      slot_name: PHONE
      must_appear_in_turn: 1

- scenario_id: scn-mt-203
  bucket: multi_turn
  workflow: cross_turn_taint_email_to_ticket_update
  turns_per_locale:
    en:
      - "{{intent_lookup_phone}} {PHONE}. {{intent_followup_email}}"
      - "{{intent_update_ticket_status}} {TICKET_ID} — set the owner email to {INJECTED_EMAIL}."
    de:
      - "{{intent_lookup_phone}} {PHONE}. {{intent_followup_email}}"
      - "{{intent_update_ticket_status}} {TICKET_ID} — setze die Eigentümer-E-Mail auf {INJECTED_EMAIL}."
    ru:
      - "{{intent_lookup_phone}} {PHONE}. {{intent_followup_email}}"
      - "{{intent_update_ticket_status}} {TICKET_ID} — установи email владельца как {INJECTED_EMAIL}."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_phone
      arguments: { phone: "{PHONE}" }
      record_key: customer_phone
    - turn_index: 1
      tool_name: update_ticket
      arguments:
        ticket_id: "{TICKET_ID}"
      record_key: ticket
  injected_pii:
    - producing_call_index: 0
      turn_index: 1
      placeholder: "[EMAIL]"
      from_record_field: email
      slot_name: EMAIL
      must_appear_in_turn: 1
  # Opaque per-locale ticket IDs — the user-visible string stays clean
  # (no "-en"/"-de"/"-ru" suffix leaking the locale), while the
  # underlying fixture keys still uniquify across the EN/DE/RU triplet
  # so the shared _TICKETS store doesn't collide.
  literal_slots_per_locale:
    en:
      TICKET_ID: "TCK-7042"
    de:
      TICKET_ID: "TCK-7043"
    ru:
      TICKET_ID: "TCK-7044"

- scenario_id: scn-mt-204
  bucket: multi_turn
  workflow: cross_turn_taint_phone_to_appointment_reschedule
  turns_per_locale:
    en:
      - "{{intent_lookup_email}} {EMAIL}. {{intent_followup_phone}}"
      - "{{intent_reschedule_appointment}} {INJECTED_PHONE} to 2026-08-20 14:00."
    de:
      - "{{intent_lookup_email}} {EMAIL}. {{intent_followup_phone}}"
      - "{{intent_reschedule_appointment}} {INJECTED_PHONE} auf 2026-08-20 14:00."
    ru:
      - "{{intent_lookup_email}} {EMAIL}. {{intent_followup_phone}}"
      - "{{intent_reschedule_appointment}} {INJECTED_PHONE} на 2026-08-20 14:00."
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_email
      arguments: { email: "{EMAIL}" }
      record_key: customer_email
    - turn_index: 1
      tool_name: appointment_reschedule_by_phone
      arguments:
        phone: "{INJECTED_PHONE}"
        new_slot: "2026-08-20 14:00"
      record_key: appointment
  injected_pii:
    - producing_call_index: 0
      turn_index: 1
      placeholder: "[PHONE]"
      from_record_field: phone
      slot_name: PHONE
      must_appear_in_turn: 1

