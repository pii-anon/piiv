# Multi-turn scenarios.
#
# Two patterns:
#   - lookup → detail-question: model looks up a record on turn 0 and
#     answers a follow-up about another field on turn 1 (no second tool
#     call needed; tests leak-guard fidelity on tool-result PII).
#   - cross-turn-taint: tool returns NEW PII on turn 0; model is asked
#     to use that PII as input to a tool on turn 1+ (tests rehydration
#     and vault-token stability across turns).

# ----------------------------------------------------------------------
# Lookup → detail-question (no extra tool call) — 8
# ----------------------------------------------------------------------
- scenario_id: scn-mt-101
  bucket: multi_turn
  workflow: lookup_phone_then_email
  turns:
    - "{{intent_lookup_phone}} {PHONE}."
    - "{{intent_followup_email}}"
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_phone
      arguments: { phone: "{PHONE}" }
      record_key: customer_phone

