# ----------------------------------------------------------------------
# Reschedule appointment by phone (2)
# ----------------------------------------------------------------------
- scenario_id: scn-st-035
  bucket: single_turn
  workflow: reschedule_appointment_by_phone
  turns_per_locale:
    en:
      - "{{intent_reschedule_appointment}} {PHONE} to 2026-06-15 10:00."
    de:
      - "{{intent_reschedule_appointment}} {PHONE} auf 2026-06-15 10:00."
    ru:
      - "{{intent_reschedule_appointment}} {PHONE} на 2026-06-15 10:00."
  expected_tool_calls:
    - turn_index: 0
      tool_name: appointment_reschedule_by_phone
      arguments: { phone: "{PHONE}", new_slot: "2026-06-15 10:00" }
      record_key: appointment

# ----------------------------------------------------------------------
# Verify national ID (4) — id_type varies per locale (default rule)
# ----------------------------------------------------------------------
- scenario_id: scn-st-040
  bucket: single_turn
  workflow: verify_national_id
  turns:
    - "{{intent_verify_id}} {NATIONAL_ID}{{intent_please_lookup}}"
  expected_tool_calls:
    - turn_index: 0
      tool_name: verify_national_id
      arguments: { id_type: "{ID_TYPE}", value: "{NATIONAL_ID}" }
      record_key: "national_id:{ID_TYPE}"

- scenario_id: scn-st-041
  bucket: single_turn
  workflow: verify_national_id
  turns:
    - "{{intent_verify_id}} {NATIONAL_ID}."
  expected_tool_calls:
    - turn_index: 0
      tool_name: verify_national_id
      arguments: { id_type: "{ID_TYPE}", value: "{NATIONAL_ID}" }
      record_key: "national_id:{ID_TYPE}"

# An additional verify_national_id scenario forced to a non-default id_type
# per locale, exercising the alternate national-id workflow.
- scenario_id: scn-st-042
  bucket: single_turn
  workflow: verify_national_id_alt
  id_type_per_locale:
    en: us_ssn
    de: de_steuer_id
    ru: ru_passport
  turns:
    - "{{intent_verify_id}} {NATIONAL_ID}{{intent_please_lookup}}"
  expected_tool_calls:
    - turn_index: 0
      tool_name: verify_national_id
      arguments: { id_type: "{ID_TYPE}", value: "{NATIONAL_ID}" }
      record_key: "national_id:{ID_TYPE}"

