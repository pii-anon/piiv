# Single-turn tool-task scenarios.
#
# Each scenario is rendered into 3 parallel near-translation EvalQuery
# instances (EN / DE / RU). The tool name is identical across the
# triplet; only language and locale-specific PII type vary.

# ----------------------------------------------------------------------
# Customer lookup by phone (8)
# ----------------------------------------------------------------------
- scenario_id: scn-st-001
  bucket: single_turn
  workflow: lookup_customer_by_phone
  turns:
    - "{{intent_lookup_phone}} {PHONE}{{intent_please_lookup}}"
  expected_tool_calls:
    - turn_index: 0
      tool_name: customer_lookup_by_phone
      arguments: { phone: "{PHONE}" }
      record_key: customer_phone

